<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Network Security Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .verify-container {
            max-width: 450px;
            width: 100%;
            margin: 20px;
        }
        
        .verify-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .otp-input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 30px 0;
        }
        
        .otp-digit {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: all 0.3s;
        }
        
        .otp-digit:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102,126,234,0.25);
            outline: none;
        }
        
        .timer {
            font-size: 14px;
            color: #666;
            margin: 15px 0;
        }
        
        .timer.warning {
            color: #dc3545;
            font-weight: bold;
        }
        
        .btn-verify {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            color: white;
            width: 100%;
        }
        
        .resend-link {
            margin-top: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="verify-container">
        <div class="verify-card">
            <i class="fas fa-shield-alt fa-3x" style="color: #667eea;"></i>
            <h3 class="mt-3">Verify Your Identity</h3>
            <p class="text-muted">Enter the 6-digit code sent to your device</p>
            
            <div class="otp-input-group">
                <input type="text" class="otp-digit" maxlength="1" id="digit1" autofocus>
                <input type="text" class="otp-digit" maxlength="1" id="digit2">
                <input type="text" class="otp-digit" maxlength="1" id="digit3">
                <input type="text" class="otp-digit" maxlength="1" id="digit4">
                <input type="text" class="otp-digit" maxlength="1" id="digit5">
                <input type="text" class="otp-digit" maxlength="1" id="digit6">
            </div>
            
            <div class="timer" id="timer">
                <i class="fas fa-clock"></i> Code expires in <span id="countdown">10:00</span>
            </div>
            
            <button class="btn btn-verify" onclick="verifyOTP()">
                <i class="fas fa-check"></i> Verify Code
            </button>
            
            <div>
                <a href="#" class="resend-link" onclick="resendOTP()">Resend Code</a>
            </div>
        </div>
    </div>
    
    <script>
        let countdownInterval;
        let timeLeft = 600; // 10 minutes in seconds
        
        // Auto-focus and move between OTP fields
        const digits = document.querySelectorAll('.otp-digit');
        
        digits.forEach((digit, index) => {
            digit.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < digits.length - 1) {
                    digits[index + 1].focus();
                }
            });
            
            digit.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    digits[index - 1].focus();
                }
            });
        });
        
        // Start countdown
        function startCountdown() {
            countdownInterval = setInterval(() => {
                timeLeft--;
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                document.getElementById('countdown').textContent = 
                    `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                const timerDiv = document.getElementById('timer');
                if (timeLeft <= 60) {
                    timerDiv.classList.add('warning');
                }
                
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    document.getElementById('countdown').textContent = 'Expired';
                    alert('OTP has expired. Please request a new one.');
                }
            }, 1000);
        }
        
        // Get OTP from input fields
        function getOTP() {
            let otp = '';
            digits.forEach(digit => {
                otp += digit.value;
            });
            return otp;
        }
        
        // Verify OTP
        async function verifyOTP() {
            const otp = getOTP();
            
            if (otp.length !== 6) {
                alert('Please enter complete 6-digit code');
                return;
            }
            
            const urlParams = new URLSearchParams(window.location.search);
            const identifier = urlParams.get('identifier');
            
            if (!identifier) {
                alert('Invalid verification request');
                return;
            }
            
            try {
                const response = await fetch('/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier, otp })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('Verification successful!');
                    window.location.href = '/login';
                } else {
                    alert('Invalid OTP. Please try again.');
                }
            } catch (error) {
                alert('Verification error: ' + error.message);
            }
        }
        
        // Resend OTP
        async function resendOTP() {
            const urlParams = new URLSearchParams(window.location.search);
            const identifier = urlParams.get('identifier');
            const method = urlParams.get('method') || 'email';
            
            try {
                const response = await fetch('/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier, method, purpose: 'verification' })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Reset timer
                    clearInterval(countdownInterval);
                    timeLeft = 600;
                    startCountdown();
                    alert('New OTP sent successfully');
                } else {
                    alert('Failed to resend OTP');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        // Initialize
        startCountdown();
    </script>
</body>
</html>
